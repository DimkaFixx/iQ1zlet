services:
  backend:
    build: ./backend
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    # Файл sql_app.db будет появляться прямо у тебя в папке backend на компе
    # Благодаря строчке выше (./backend:/app), данные будут сохраняться.

  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true # Еще один фикс для Hot Reload
    depends_on:
      - backend